<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h2>Enterprise Portal</h2>

    <div class="tabs">
      <button class="tab active" data-tab="login"    onclick="switchTab('login')">Login</button>
      <button class="tab"        data-tab="register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@company.com"
               autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>
      <button type="submit" id="login-btn" class="btn-primary">Login</button>
    </form>

    <!-- REGISTER -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)" novalidate>
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="johndoe"
               autocomplete="username" required minlength="2">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com"
               autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters"
               autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" id="register-btn" class="btn-primary">Create Account</button>
    </form>

    <div class="message hidden" id="msg"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
