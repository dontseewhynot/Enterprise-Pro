<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles/app.css">
    <title>User Management</title>
  </head>
  <body>

    <h2>Add User</h2>

    <form id="userForm">
      <input id="username" placeholder="Username" autocomplete="off" required>
      <input id="password" placeholder="Password (min 6 chars)" type="password" required>
      <button id="addButton" type="submit">Add User</button>
    </form>

    <p id="status"></p>
    <div id="error"></div>

    <h3>Users:</h3>
    <ul id="userList"><li class="loading">Loading…</li></ul>

    <script src="Scripts/app.js"></script>

  </body>
</html>

</html>
